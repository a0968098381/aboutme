<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蔡淳彥網站</title>

<style>
body {
    font-family: 標楷體;
    text-align: center;
    background: #f5f5f5;
}

h1 { color: #0077cc; }

button {
    padding: 8px 15px;
    border: none;
    background: #0077cc;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #005fa3;
}

#calcPage {
    display: none;
    margin-top: 20px;
}

.box {
    background: white;
    padding: 20px;
    margin: 20px auto;
    width: 300px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
</style>

<script>
function showCalc() {
    document.getElementById("home").style.display = "none";
    document.getElementById("calcPage").style.display = "block";
}

function goHome() {
    document.getElementById("home").style.display = "block";
    document.getElementById("calcPage").style.display = "none";
}

function calculate() {
    let x = document.getElementById("x").value;
    let y = document.getElementById("y").value;
    let opt = document.getElementById("opt").value;

    if (x === "" || y === "") {
        alert("請輸入完整數值！");
        return;
    }

    x = parseFloat(x);
    y = parseFloat(y);

    let result;

    if (opt === "^") {
        result = Math.pow(x, y);
        document.getElementById("result").innerText =
            x + " ^ " + y + " = " + result;
    } 
    else if (opt === "root") {
        result = Math.pow(x, 1 / y);
        document.getElementById("result").innerText =
            x + " 的 " + y + " 次根 = " + result;
    } 
    else {
        document.getElementById("result").innerText = "錯誤";
    }
}
</script>
</head>

<body>

<!-- 首頁 -->
<div id="home" class="box">
    <h1>蔡淳彥的網站</h1>
    <p>靜宜資管</p>

    <button onclick="showCalc()">👉 次方與根號計算</button>
</div>

<!-- 計算頁 -->
<div id="calcPage" class="box">

    <h2>次方與根號計算</h2>

    x: <input type="number" id="x"><br><br>

    運算:
    <select id="opt">
        <option value="^">次方 (x^y)</option>
        <option value="root">開根號 (x^(1/y))</option>
    </select><br><br>

    y: <input type="number" id="y"><br><br>

    <button onclick="calculate()">計算</button>

    <p id="result" style="font-weight:bold; color:#cc0000;"></p>

    <br>
    <button onclick="goHome()">⬅ 回首頁</button>
</div>

</body>
</html>
